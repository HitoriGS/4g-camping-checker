services:
  - type: web
    name: camping-signal-checker-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
